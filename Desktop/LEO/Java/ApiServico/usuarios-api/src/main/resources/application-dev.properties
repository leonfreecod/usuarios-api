# ==============================================================
# CONFIGURAÇÃO DE DESENVOLVIMENTO (LOCAL)
# ==============================================================
# Porta para rodar localmente (evita conflito com a 8080)
server.port=8081

# Conexão com o banco de dados local (MySQL)
# Certifique-se de que o banco 'usuarios_api' existe no seu MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/usuarios_api?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

# Configurações do JPA/Hibernate para dev
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
